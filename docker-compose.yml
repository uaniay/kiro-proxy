services:
  kiro-proxy:
    build: .
    ports:
      - "9199:9199"
    environment:
      - PROXY_API_KEY=${PROXY_API_KEY}
      - DATABASE_URL=sqlite:/data/kiro-proxy.db?mode=rwc
      - KIRO_REFRESH_TOKEN=${KIRO_REFRESH_TOKEN}
      - KIRO_CLIENT_ID=${KIRO_CLIENT_ID}
      - KIRO_CLIENT_SECRET=${KIRO_CLIENT_SECRET}
      - KIRO_REGION=${KIRO_REGION:-us-east-1}
      - KIRO_SSO_REGION=${KIRO_SSO_REGION}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9199
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - kiro-data:/data
    restart: unless-stopped

volumes:
  kiro-data:
